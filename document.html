<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg?v=20260721-1">
  <meta name="description" content="UltraTech 设计文档与开发日志">
  <title>UltraTech 文档</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./document.css?v=20260721-outline-left-3">
  <link rel="stylesheet" href="./site-nav.css">
</head>
<body class="document-page">
  <main class="document-main">
    <div class="document-layout">
      <section class="document-shell">
        <div class="document-meta">
          <div>
            <p class="eyebrow">UltraTech Documentation</p>
            <span id="documentPath">正在加载文档</span>
          </div>
          <a class="document-archive-link" href="./archive.html">返回文档目录</a>
        </div>
        <article id="markdownContent" class="markdown-body" aria-live="polite">
          <p class="loading">正在读取 Markdown 文档。</p>
        </article>
      </section>
      <aside id="documentTocPanel" class="document-toc-panel" aria-label="本文目录">
        <div class="document-toc-heading">
          <div><p class="eyebrow">Outline</p><h2>本文目录</h2></div>
          <span id="documentTocCount">加载中</span>
        </div>
        <label class="document-toc-search-label" for="documentTocSearch">筛选标题</label>
        <input id="documentTocSearch" class="document-toc-search" type="search" placeholder="筛选标题">
        <nav id="documentToc" class="document-toc" aria-label="文档标题目录"></nav>
        <p id="documentTocEmpty" class="document-toc-empty" hidden>没有匹配的标题。</p>
      </aside>
    </div>
  </main>

  <footer>
    <span>UltraTech Static Blog</span>
    <a class="button" href="./archive.html">全部文档</a>
  </footer>

  <button id="documentBackToTop" class="document-back-to-top" type="button" aria-label="返回文档顶部和目录">↑ 返回顶部</button>

  <script src="./document.js?v=20260721-outline-left-3"></script>
  <script src="./site-nav.js"></script>
</body>
</html>
